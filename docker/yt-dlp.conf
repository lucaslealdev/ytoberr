# System-wide yt-dlp config for this image (read automatically from /etc/yt-dlp.conf on Linux).
#
# yt-dlp defaults to trying deno as its JS runtime (needed to reliably resolve YouTube's
# signature challenges), but deno's official Linux build is glibc-only and can't run on this
# musl-based (Alpine) image — it'll be silently skipped as "unavailable". Node.js is bundled
# in this image specifically to fill that gap; this just tells yt-dlp to also consider it.
--js-runtimes node
